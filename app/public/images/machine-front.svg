<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="marquee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D0A5C"/>
      <stop offset="100%" stop-color="#1A0040"/>
    </linearGradient>
    <linearGradient id="cabinet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0040"/>
      <stop offset="50%" stop-color="#120030"/>
      <stop offset="100%" stop-color="#080012"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,184,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(123,47,190,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Cabinet body -->
  <rect x="30" y="60" width="340" height="620" rx="25" fill="url(#cabinet)" stroke="#4A0E8F" stroke-width="3"/>

  <!-- Top marquee area -->
  <rect x="35" y="65" width="330" height="90" rx="20" fill="url(#marquee)" stroke="#FFB800" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="38" fill="#FFB800" letter-spacing="4">CHISPÍN</text>
  <circle cx="100" cy="110" r="3" fill="#FF6B00" opacity="0.6"/>
  <circle cx="150" cy="105" r="2" fill="#C8A5FF" opacity="0.4"/>
  <circle cx="250" cy="108" r="2.5" fill="#FF6B00" opacity="0.5"/>
  <circle cx="300" cy="112" r="3" fill="#C8A5FF" opacity="0.6"/>

  <!-- Glass area - fully transparent (just border indication) -->
  <rect x="55" y="170" width="290" height="360" rx="6" fill="none" stroke="rgba(200,165,255,0.2)" stroke-width="1.5" stroke-dasharray="4,6"/>
  <!-- Subtle glass reflection lines -->
  <line x1="55" y1="350" x2="345" y2="350" stroke="rgba(200,165,255,0.06)" stroke-width="1"/>
  <line x1="200" y1="170" x2="200" y2="530" stroke="rgba(200,165,255,0.04)" stroke-width="1"/>

  <!-- Control panel -->
  <rect x="35" y="540" width="330" height="130" rx="12" fill="#2D0A5C" stroke="#4A0E8F" stroke-width="1"/>

  <!-- Joystick area -->
  <circle cx="120" cy="605" r="32" fill="#080012" stroke="#FFB800" stroke-width="2.5"/>
  <circle cx="120" cy="605" r="14" fill="#FFB800"/>
  <circle cx="120" cy="605" r="6" fill="#1A0040"/>
  <!-- Joystick directional arrows -->
  <path d="M120 585 L120 595" stroke="#FFB800" stroke-width="1.5" opacity="0.5"/>
  <path d="M120 615 L120 625" stroke="#FFB800" stroke-width="1.5" opacity="0.5"/>
  <path d="M100 605 L110 605" stroke="#FFB800" stroke-width="1.5" opacity="0.5"/>
  <path d="M130 605 L140 605" stroke="#FFB800" stroke-width="1.5" opacity="0.5"/>

  <!-- Catch button -->
  <circle cx="280" cy="605" r="30" fill="#FF6B00" stroke="#FFB800" stroke-width="3"/>
  <circle cx="280" cy="605" r="22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="280" y="602" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="9" fill="#1A0040">ATRAPA</text>
  <text x="280" y="614" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="7" fill="#1A0040">🔥</text>

  <!-- Bottom trim -->
  <rect x="35" y="670" width="330" height="8" rx="4" fill="#FFB800" opacity="0.3"/>
  <rect x="35" y="672" width="330" height="3" rx="1.5" fill="#FFB800" opacity="0.6"/>
</svg>
