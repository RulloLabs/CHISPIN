<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080012"/>
      <stop offset="40%" stop-color="#1A0040"/>
      <stop offset="100%" stop-color="#120030"/>
    </linearGradient>
    <radialGradient id="firework1" cx="50%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="firework2" cx="70%" cy="25%" r="25%">
      <stop offset="0%" stop-color="#C8A5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C8A5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="firework3" cx="30%" cy="20%" r="20%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- Fireworks bursts -->
  <circle cx="200" cy="80" r="80" fill="url(#firework1)"/>
  <circle cx="420" cy="60" r="70" fill="url(#firework2)"/>
  <circle cx="300" cy="50" r="60" fill="url(#firework3)"/>

  <!-- Firework particles -->
  <g stroke="#FF6B00" stroke-width="1.5" opacity="0.6">
    <line x1="200" y1="80" x2="180" y2="40"/>
    <line x1="200" y1="80" x2="220" y2="35"/>
    <line x1="200" y1="80" x2="160" y2="60"/>
    <line x1="200" y1="80" x2="240" y2="55"/>
    <line x1="200" y1="80" x2="185" y2="110"/>
    <line x1="200" y1="80" x2="215" y2="115"/>
  </g>
  <g stroke="#C8A5FF" stroke-width="1.5" opacity="0.5">
    <line x1="420" y1="60" x2="400" y2="20"/>
    <line x1="420" y1="60" x2="440" y2="25"/>
    <line x1="420" y1="60" x2="380" y2="45"/>
    <line x1="420" y1="60" x2="460" y2="40"/>
    <line x1="420" y1="60" x2="405" y2="90"/>
    <line x1="420" y1="60" x2="435" y2="95"/>
  </g>
  <g stroke="#FFB800" stroke-width="1" opacity="0.4">
    <line x1="300" y1="50" x2="285" y2="20"/>
    <line x1="300" y1="50" x2="315" y2="15"/>
    <line x1="300" y1="50" x2="270" y2="35"/>
    <line x1="300" y1="50" x2="330" y2="30"/>
    <line x1="300" y1="50" x2="290" y2="75"/>
    <line x1="300" y1="50" x2="310" y2="80"/>
  </g>

  <!-- Ferris wheel / verbena lights -->
  <g opacity="0.4">
    <circle cx="500" cy="280" r="60" fill="none" stroke="#FFB800" stroke-width="1.5"/>
    <circle cx="500" cy="280" r="50" fill="none" stroke="#FF6B00" stroke-width="1"/>
    <line x1="500" y1="220" x2="500" y2="340" stroke="#FFB800" stroke-width="1" opacity="0.3"/>
    <line x1="440" y1="280" x2="560" y2="280" stroke="#FF6B00" stroke-width="1" opacity="0.3"/>
    <circle cx="500" cy="220" r="3" fill="#FFB800"/>
    <circle cx="500" cy="340" r="3" fill="#FFB800"/>
    <circle cx="440" cy="280" r="3" fill="#FF6B00"/>
    <circle cx="560" cy="280" r="3" fill="#FF6B00"/>
  </g>

  <!-- Town/buildings silhouette -->
  <g fill="#0D0020" opacity="0.7">
    <rect x="0" y="320" width="40" height="80"/>
    <rect x="35" y="300" width="50" height="100"/>
    <rect x="80" y="330" width="30" height="70"/>
    <rect x="105" y="310" width="45" height="90"/>
    <rect x="145" y="340" width="35" height="60"/>
    <rect x="400" y="310" width="55" height="90"/>
    <rect x="450" y="330" width="40" height="70"/>
    <rect x="485" y="340" width="50" height="60"/>
    <rect x="530" y="320" width="70" height="80"/>
  </g>

  <!-- Window lights in buildings -->
  <g fill="#FFB800" opacity="0.3">
    <rect x="45" y="310" width="6" height="6" rx="1"/>
    <rect x="60" y="330" width="6" height="6" rx="1"/>
    <rect x="115" y="320" width="6" height="6" rx="1"/>
    <rect x="130" y="345" width="6" height="6" rx="1"/>
    <rect x="410" y="325" width="6" height="6" rx="1"/>
    <rect x="430" y="340" width="6" height="6" rx="1"/>
    <rect x="460" y="345" width="6" height="6" rx="1"/>
    <rect x="540" y="330" width="6" height="6" rx="1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="380" width="600" height="20" fill="#080012"/>

  <!-- Purple glow at bottom -->
  <rect x="0" y="340" width="600" height="40" fill="#7B2FBE" opacity="0.08"/>

  <!-- String lights across top -->
  <path d="M0 140 Q75 160 150 140 Q225 160 300 140 Q375 160 450 140 Q525 160 600 140" fill="none" stroke="rgba(255,184,0,0.15)" stroke-width="1"/>
  <circle cx="75" cy="148" r="3" fill="#FFB800" opacity="0.3"/>
  <circle cx="150" cy="143" r="3" fill="#FF6B00" opacity="0.3"/>
  <circle cx="225" cy="148" r="3" fill="#C8A5FF" opacity="0.3"/>
  <circle cx="300" cy="143" r="3" fill="#FFB800" opacity="0.3"/>
  <circle cx="375" cy="148" r="3" fill="#FF6B00" opacity="0.3"/>
  <circle cx="450" cy="143" r="3" fill="#C8A5FF" opacity="0.3"/>
  <circle cx="525" cy="148" r="3" fill="#FFB800" opacity="0.3"/>
</svg>
