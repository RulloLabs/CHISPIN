<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="cabinet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0040"/>
      <stop offset="50%" stop-color="#120030"/>
      <stop offset="100%" stop-color="#080012"/>
    </linearGradient>
  </defs>

  <!-- Cabinet side body (mirrored - controls on left side of view) -->
  <rect x="120" y="60" width="160" height="620" rx="12" fill="url(#cabinet)" stroke="#4A0E8F" stroke-width="2"/>

  <!-- Top marquee side -->
  <rect x="120" y="60" width="160" height="90" rx="12" fill="#2D0A5C" stroke="#FFB800" stroke-width="1.5"/>
  <line x1="140" y1="90" x2="260" y2="90" stroke="#FFB800" stroke-width="1" opacity="0.4"/>

  <!-- Glass side panel - transparent -->
  <rect x="125" y="160" width="150" height="380" rx="4" fill="none" stroke="rgba(200,165,255,0.15)" stroke-width="1.5" stroke-dasharray="3,5"/>
  <line x1="125" y1="350" x2="275" y2="350" stroke="rgba(200,165,255,0.05)" stroke-width="1"/>

  <!-- Control panel side -->
  <rect x="120" y="545" width="160" height="125" rx="10" fill="#2D0A5C" stroke="#4A0E8F" stroke-width="1"/>

  <!-- Catch button from side (mirrored - on left) -->
  <rect x="140" y="580" width="50" height="18" rx="9" fill="#FF6B00" stroke="#FFB800" stroke-width="1.5"/>

  <!-- Joystick from side (mirrored - on right) -->
  <rect x="200" y="580" width="60" height="18" rx="5" fill="#080012" stroke="#FFB800" stroke-width="1.5"/>
  <rect x="215" y="570" width="30" height="10" rx="3" fill="#FFB800"/>

  <!-- Bottom trim -->
  <rect x="120" y="670" width="160" height="8" rx="4" fill="#FFB800" opacity="0.3"/>
  <rect x="120" y="672" width="160" height="3" rx="1.5" fill="#FFB800" opacity="0.6"/>

  <!-- Front edge highlight -->
  <line x1="120" y1="60" x2="120" y2="678" stroke="rgba(255,184,0,0.1)" stroke-width="2"/>
</svg>
